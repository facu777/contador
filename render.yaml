services:
  - type: web
    name: github-views-counter
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: github-views-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        value: https://your-render-domain.onrender.com/api/auth/github/callback
      - key: CACHE_TTL_SECONDS
        value: 86400

databases:
  - name: github-views-db
    plan: free
    postgresMajorVersion: 16
